name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm pack

      - name: Create release and upload tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" *.tgz --title "${{ github.ref_name }}" --generate-notes
