name: scheduled rebuild
run-name: scheduled rebuild - ${{ github.event_name }}

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'  # 毎週月曜 03:00 UTC

permissions:
  contents: read
  packages: write

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check.outputs.updated }}
    steps:
      - uses: actions/checkout@v6

      - name: Get current Ghost base image digest
        id: digest
        run: |
          GHOST_IMAGE=$(grep "^FROM ghost:" Dockerfile | head -1 | awk '{print $2}')
          DIGEST=$(docker buildx imagetools inspect "${GHOST_IMAGE}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "value=$DIGEST" >> $GITHUB_OUTPUT

      - name: Check digest cache
        id: cache
        uses: actions/cache@v5
        with:
          path: /tmp/ghost-digest
          key: ghost-base-${{ steps.digest.outputs.value }}
          restore-keys: ghost-base-

      - name: Determine if rebuild needed
        id: check
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "Ghost base image unchanged: ${{ steps.digest.outputs.value }}"
          else
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "Ghost base image updated: ${{ steps.digest.outputs.value }}"
            echo "${{ steps.digest.outputs.value }}" > /tmp/ghost-digest
          fi

  build:
    needs: check-and-rebuild
    if: needs.check-and-rebuild.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
